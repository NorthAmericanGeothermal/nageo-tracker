<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f4f4f0;color:#1a1a1a;min-height:100vh;}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#f4f4f0;}
.login-card{background:#fff;border-radius:16px;border:0.5px solid #ddd;padding:2rem;width:340px;max-width:90vw;text-align:center;box-sizing:border-box;overflow:hidden;}
.login-logo{font-size:22px;font-weight:600;margin-bottom:4px;}.login-logo span{color:#2563eb;}
.login-sub{font-size:13px;color:#888;margin-bottom:2rem;}
.user-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:1.5rem;}
.user-btn{padding:12px;border:0.5px solid #ddd;border-radius:10px;background:#fff;cursor:pointer;font-size:14px;font-weight:500;color:#1a1a1a;}
.user-btn:hover{background:#f4f4f0;}.user-btn.selected{border-color:#2563eb;background:#eff6ff;color:#2563eb;}
.pin-row{display:flex;gap:8px;margin-bottom:1rem;}
.pin-input{width:100%;max-width:100%;padding:10px 14px;border:0.5px solid #ddd;border-radius:8px;font-size:16px;text-align:center;letter-spacing:6px;background:#f9f9f7;margin-bottom:1rem;box-sizing:border-box;-webkit-appearance:none;}
.pin-input:focus{outline:none;border-color:#2563eb;}
.login-btn{width:100%;max-width:100%;padding:11px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;box-sizing:border-box;-webkit-appearance:none;}
.login-btn:hover{background:#1d4ed8;}.login-error{font-size:12px;color:#dc2626;margin-top:8px;}
#app{display:none;}
.topbar{background:#fff;border-bottom:0.5px solid #e5e5e5;padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:100;}
.topbar-logo{font-size:15px;font-weight:600;flex:1;}.topbar-logo span{color:#2563eb;}
.topbar-user{font-size:12px;color:#888;}.topbar-user strong{color:#1a1a1a;}
.logout-btn{font-size:12px;padding:4px 10px;border:0.5px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#888;}
.sync-btn{font-size:12px;padding:5px 12px;border:0.5px solid #2563eb;border-radius:6px;background:#fff;cursor:pointer;color:#2563eb;}
.settings-btn{font-size:18px;background:none;border:none;cursor:pointer;color:#888;padding:4px;}
.main{max-width:1200px;margin:0 auto;padding:1.5rem;}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem;}
.stat{background:#fff;border-radius:10px;border:0.5px solid #e5e5e5;padding:12px 16px;}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;}.stat-value{font-size:24px;font-weight:600;color:#1a1a1a;}
.view-toggle{display:flex;gap:6px;margin-bottom:1.25rem;}
.vbtn{padding:6px 14px;font-size:13px;border-radius:8px;border:0.5px solid #ddd;background:#fff;color:#888;cursor:pointer;}
.vbtn.active{background:#f4f4f0;color:#1a1a1a;font-weight:500;border-color:#bbb;}
.overview-wrap{overflow-x:auto;background:#fff;border-radius:12px;border:0.5px solid #e5e5e5;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead tr{border-bottom:0.5px solid #e5e5e5;}
th{padding:10px 12px;text-align:left;color:#888;font-weight:400;white-space:nowrap;}
td{padding:9px 12px;border-bottom:0.5px solid #f0f0f0;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.inst-name-cell{font-weight:500;color:#1a1a1a;font-size:13px;}.inst-addr-cell{font-size:11px;color:#888;margin-top:1px;}
.equip-cell{font-size:11px;color:#555;max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ms-dot{width:20px;height:20px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:10px;}
.dot-done{background:#dcfce7;color:#16a34a;}.dot-inprog{background:#fef9c3;color:#ca8a04;}
.dot-delayed{background:#fee2e2;color:#dc2626;}.dot-none{background:#f4f4f0;color:#bbb;}.dot-na{background:#e5e5e5;color:#555;font-size:9px;font-weight:600;}
.delay-badge{font-size:10px;padding:2px 8px;border-radius:6px;background:#fee2e2;color:#dc2626;}
.dot-wrap{position:relative;display:inline-block;}
.dot-wrap .tip{display:none;position:fixed;background:#1a1a1a;color:#fff;font-size:13px;padding:10px 14px;border-radius:8px;white-space:normal;width:280px;z-index:500;line-height:1.6;text-align:left;pointer-events:none;transform:translateX(-50%);}.dot-wrap .tip.tip-down{bottom:auto;top:calc(100% + 6px);}
.dot-wrap .tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#1a1a1a;}.dot-wrap .tip.tip-right::after{display:none;}.dot-wrap .tip.tip-down::after{top:auto;bottom:100%;border-top-color:transparent;border-bottom-color:#1a1a1a;}
/* tooltip display handled by JS */
.installs{display:flex;flex-direction:column;gap:10px;}
.card{background:#fff;border:0.5px solid #e5e5e5;border-radius:14px;overflow:hidden;transition:border-color 0.15s;}
.card.drag-over{border:1.5px solid #2563eb;background:#eff6ff;}.card.dragging{opacity:0.4;}
.card-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;}
.card-header:hover{background:#fafaf8;}
.drag-handle{cursor:grab;color:#ccc;font-size:18px;padding:0 2px;flex-shrink:0;user-select:none;}
.drag-handle:hover{color:#888;}
.avatar{width:38px;height:38px;border-radius:50%;background:#dbeafe;color:#2563eb;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;}
.card-meta{flex:1;min-width:0;}.card-name{font-size:14px;font-weight:600;color:#1a1a1a;}
.card-addr{font-size:12px;color:#888;margin-top:1px;}.card-equip{font-size:11px;color:#2563eb;margin-top:2px;}
.card-pills{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.pill{font-size:11px;padding:3px 9px;border-radius:6px;}
.pill-prog{background:#f4f4f0;color:#555;}.pill-delayed{background:#fee2e2;color:#dc2626;}.pill-done{background:#dcfce7;color:#16a34a;}
.chevron{font-size:14px;color:#bbb;transition:transform 0.2s;flex-shrink:0;}.chevron.open{transform:rotate(180deg);}
.card-body{display:none;border-top:0.5px solid #f0f0f0;}.card-body.open{display:block;}
.equip-section{padding:12px 16px;border-bottom:0.5px solid #f0f0f0;display:flex;align-items:center;gap:10px;}
.equip-label{font-size:11px;color:#888;white-space:nowrap;}
.equip-input{flex:1;font-size:13px;padding:6px 10px;border:0.5px solid #ddd;border-radius:8px;background:#f9f9f7;color:#1a1a1a;font-family:inherit;}
.equip-input:focus{outline:none;border-color:#2563eb;}
.ms-list{padding:12px 16px;display:flex;flex-direction:column;gap:5px;}
.ms-row{border:0.5px solid #e5e5e5;border-radius:8px;overflow:hidden;}
.ms-row.done-row{border-color:#86efac;background:#f0fdf4;}.ms-row.inprog-row{border-color:#fde047;}.ms-row.delayed-row{border-color:#fca5a5;}.ms-row.na-row{border-color:#ddd;background:#f9f9f7;}
.ms-main{display:flex;align-items:center;gap:10px;padding:9px 12px;cursor:pointer;}
.ms-main:hover{background:rgba(0,0,0,0.02);}
.si{width:20px;height:20px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;}
.si-done{background:#dcfce7;border-color:#86efac;color:#16a34a;}.si-inprog{background:#fef9c3;border-color:#fde047;color:#ca8a04;}.si-delayed{background:#fee2e2;border-color:#fca5a5;color:#dc2626;}.si-na{background:#e5e5e5;border-color:#bbb;color:#555;font-size:8px;font-weight:600;}
.ms-label{flex:1;font-size:13px;color:#1a1a1a;}.ms-label.done-lbl{text-decoration:line-through;color:#aaa;}
.ms-date-tag{font-size:11px;color:#888;white-space:nowrap;}
.ms-pinned-tag{font-size:10px;color:#2563eb;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;}
.ms-chevron{font-size:12px;color:#bbb;transition:transform 0.2s;flex-shrink:0;}.ms-chevron.open{transform:rotate(180deg);}
.drill-steps{display:flex;flex-direction:column;gap:6px;margin-top:6px;}
.drill-step{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:0.5px solid #f0f0f0;}
.drill-step:last-child{border-bottom:none;}
.drill-step-label{font-size:12px;color:#1a1a1a;width:60px;flex-shrink:0;font-weight:500;}
.drill-date{font-size:12px;padding:4px 8px;border:0.5px solid #ddd;border-radius:6px;background:#f9f9f7;color:#1a1a1a;font-family:inherit;}
.drill-date:focus{outline:none;border-color:#2563eb;}
.drill-done-tag{font-size:10px;color:#16a34a;font-weight:600;margin-left:4px;}
.ms-detail{padding:0 12px 10px 42px;display:flex;flex-direction:column;gap:8px;}
.det-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.det-lbl{font-size:11px;color:#888;width:72px;flex-shrink:0;}
.state-btns{display:flex;gap:4px;flex-wrap:wrap;}
.sbtn{font-size:11px;padding:3px 10px;border-radius:6px;border:0.5px solid #ddd;background:#fff;color:#888;cursor:pointer;font-family:inherit;}
.sbtn:hover{background:#f4f4f0;}
.sbtn.a-none{background:#f4f4f0;color:#555;border-color:#bbb;}.sbtn.a-inprog{background:#fef9c3;color:#ca8a04;border-color:#fde047;}
.sbtn.a-delayed{background:#fee2e2;color:#dc2626;border-color:#fca5a5;}.sbtn.a-done{background:#dcfce7;color:#16a34a;border-color:#86efac;}.sbtn.a-na{background:#e5e5e5;color:#555;border-color:#bbb;}
.det-input{font-size:12px;padding:4px 8px;border:0.5px solid #ddd;border-radius:6px;background:#f9f9f7;color:#1a1a1a;font-family:inherit;}
.det-input:focus{outline:none;border-color:#2563eb;}.det-input.wide{flex:1;min-width:0;}
.pinned-note-box{flex:1;font-size:12px;color:#2563eb;line-height:1.4;}
.unpin-btn{font-size:10px;padding:2px 8px;border-radius:6px;border:0.5px solid #ddd;background:#fff;cursor:pointer;color:#888;}
.notes-section{padding:12px 16px;border-top:0.5px solid #f0f0f0;}
.notes-hdr{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.notes-title{font-size:12px;color:#888;}
.notes-body{margin-top:10px;display:none;}.notes-body.open{display:block;}
.note-item{padding:8px 10px;border:0.5px solid #e5e5e5;border-radius:8px;margin-bottom:6px;display:flex;gap:8px;align-items:flex-start;}
.note-text{flex:1;font-size:12px;color:#1a1a1a;line-height:1.5;}
.note-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0;}
.pin-btn{font-size:10px;padding:2px 8px;border-radius:6px;border:0.5px solid #ddd;background:#fff;color:#888;cursor:pointer;font-family:inherit;}
.pin-btn:hover{background:#f4f4f0;}.pin-btn.pinned{background:#dbeafe;color:#2563eb;border-color:#93c5fd;}
.pin-select{font-size:10px;padding:2px 6px;border:0.5px solid #ddd;border-radius:6px;background:#f9f9f7;color:#1a1a1a;font-family:inherit;}
.delete-zone{padding:10px 16px;border-top:0.5px solid #f0f0f0;display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.nc-section{padding:14px 16px;border-top:0.5px solid #f0f0f0;background:#fafaf8;}
.nc-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
.nc-title{font-size:12px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:6px;}
.nc-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:#dbeafe;color:#2563eb;font-weight:500;}
.nc-item{margin-bottom:12px;}
.nc-item-header{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.nc-item-label{font-size:12px;font-weight:500;color:#1a1a1a;}
.nc-check{width:16px;height:16px;border-radius:3px;border:1.5px solid #ddd;cursor:pointer;flex-shrink:0;accent-color:#2563eb;}
.nc-input{width:100%;font-size:12px;padding:5px 9px;border:0.5px solid #ddd;border-radius:6px;background:#fff;color:#1a1a1a;font-family:inherit;}
.nc-input:focus{outline:none;border-color:#2563eb;}
.nc-row{display:flex;gap:8px;}
.nc-row .nc-input{flex:1;}
.nc-label-small{font-size:11px;color:#888;margin-bottom:3px;}
.add-nc-btn{font-size:12px;padding:5px 12px;border:0.5px solid #2563eb;border-radius:8px;background:#fff;color:#2563eb;cursor:pointer;font-family:inherit;}
.add-nc-btn:hover{background:#eff6ff;}
.nc-overview-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#dbeafe;color:#2563eb;font-weight:600;margin-left:4px;vertical-align:middle;}
.duct-overview-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#f3e8ff;color:#7c3aed;font-weight:600;margin-left:4px;vertical-align:middle;}
.repl-overview-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:#fef9c3;color:#854d0e;font-weight:600;margin-left:4px;vertical-align:middle;}
.add-repl-btn{font-size:12px;padding:5px 12px;border:0.5px solid #ca8a04;border-radius:8px;background:#fff;color:#ca8a04;cursor:pointer;font-family:inherit;}
.add-repl-btn:hover{background:#fef9c3;}
.repl-section{padding:14px 16px;border-top:0.5px solid #f0f0f0;background:#fefef0;}
.docs-section{padding:14px 16px;border-top:0.5px solid #f0f0f0;}
.docs-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.docs-title{font-size:12px;font-weight:600;color:#1a1a1a;}
.drop-zone{border:1.5px dashed #ddd;border-radius:8px;padding:16px;text-align:center;cursor:pointer;transition:all 0.15s;background:#fafaf8;margin-bottom:10px;}
.drop-zone:hover,.drop-zone.drag-active{border-color:#2563eb;background:#eff6ff;}
.drop-zone-text{font-size:12px;color:#888;}
.drop-zone-text strong{color:#2563eb;cursor:pointer;}
.doc-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border:0.5px solid #e5e5e5;border-radius:8px;margin-bottom:6px;background:#fff;}
.doc-icon{font-size:18px;flex-shrink:0;}
.doc-info{flex:1;min-width:0;}
.doc-name{font-size:12px;font-weight:500;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.doc-meta{font-size:10px;color:#aaa;margin-top:1px;}
.doc-category{font-size:10px;padding:2px 7px;border-radius:4px;background:#f4f4f0;color:#555;border:none;font-family:inherit;cursor:pointer;}
.doc-actions{display:flex;gap:6px;flex-shrink:0;}
.doc-btn{font-size:11px;padding:3px 9px;border-radius:6px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-family:inherit;color:#555;}
.doc-btn:hover{background:#f4f4f0;}
.doc-btn.danger{border-color:#fca5a5;color:#dc2626;}
.doc-btn.danger:hover{background:#fee2e2;}
.doc-uploading{font-size:11px;color:#2563eb;padding:4px 0;}
.docs-tab-section{margin-top:0;}
.docs-job-group{background:#fff;border:0.5px solid #e5e5e5;border-radius:12px;overflow:hidden;margin-bottom:10px;}
.docs-job-header{padding:12px 16px;cursor:pointer;display:flex;align-items:center;gap:10px;border-bottom:0.5px solid #f0f0f0;}
.docs-job-header:hover{background:#fafaf8;}
.docs-job-name{font-size:14px;font-weight:600;color:#1a1a1a;flex:1;}
.docs-job-count{font-size:11px;color:#888;}
.docs-job-body{padding:12px 16px;display:none;}
.docs-job-body.open{display:block;}
.upload-progress{height:4px;background:#dbeafe;border-radius:2px;margin-top:4px;overflow:hidden;}
.upload-progress-bar{height:100%;background:#2563eb;border-radius:2px;transition:width 0.2s;}
.mini-drop-zone{border:1.5px dashed #ddd;border-radius:6px;padding:8px 12px;text-align:center;cursor:pointer;margin-top:6px;background:#fafaf8;font-size:11px;color:#888;transition:all 0.15s;}
.mini-drop-zone:hover,.mini-drop-zone.drag-active{border-color:#2563eb;background:#eff6ff;color:#2563eb;}
.mini-doc-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border:0.5px solid #e5e5e5;border-radius:6px;margin-top:4px;background:#fff;font-size:11px;}
.mini-doc-name{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#1a1a1a;}
.mini-doc-btn{font-size:10px;padding:2px 7px;border-radius:4px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-family:inherit;color:#555;white-space:nowrap;}
.mini-doc-btn.danger{border-color:#fca5a5;color:#dc2626;}
.ms-dropzone{border:1px dashed #ddd;border-radius:6px;padding:8px 12px;margin-top:6px;cursor:pointer;background:#fafaf8;transition:all 0.15s;}
.ms-dropzone:hover,.ms-dropzone.drag-active{border-color:#2563eb;background:#eff6ff;}
.ms-dropzone-text{font-size:11px;color:#aaa;text-align:center;}
.ms-dropzone-text strong{color:#2563eb;cursor:pointer;}
.ms-doc-item{display:flex;align-items:center;gap:8px;padding:5px 8px;border:0.5px solid #e5e5e5;border-radius:6px;margin-top:4px;background:#fff;}
.ms-doc-name{flex:1;font-size:11px;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ms-doc-btn{font-size:10px;padding:2px 7px;border-radius:5px;border:0.5px solid #ddd;background:#fff;cursor:pointer;font-family:inherit;color:#555;}
.ms-doc-btn:hover{background:#f4f4f0;}
.ms-doc-btn.danger{border-color:#fca5a5;color:#dc2626;}
.ms-doc-btn.danger:hover{background:#fee2e2;}
.repl-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:#fef9c3;color:#854d0e;font-weight:500;}
.add-duct-btn{font-size:12px;padding:5px 12px;border:0.5px solid #7c3aed;border-radius:8px;background:#fff;color:#7c3aed;cursor:pointer;font-family:inherit;}
.add-duct-btn:hover{background:#f3e8ff;}
.duct-section{padding:14px 16px;border-top:0.5px solid #f0f0f0;background:#faf8ff;}
.duct-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.duct-title{font-size:12px;font-weight:600;color:#1a1a1a;display:flex;align-items:center;gap:6px;}
.duct-badge{font-size:10px;padding:2px 7px;border-radius:4px;background:#f3e8ff;color:#7c3aed;font-weight:500;}
.delete-btn{font-size:12px;padding:5px 12px;border:0.5px solid #fca5a5;border-radius:8px;background:#fff;color:#dc2626;cursor:pointer;font-family:inherit;}
.archive-btn{font-size:12px;padding:5px 12px;border:0.5px solid #888;border-radius:8px;background:#fff;color:#555;cursor:pointer;font-family:inherit;margin-right:6px;}
.archive-btn:hover{background:#f4f4f0;}
.archived-card{background:#fff;border:0.5px solid #e5e5e5;border-radius:14px;overflow:hidden;opacity:0.8;}
.archived-header{display:flex;align-items:center;gap:12px;padding:14px 16px;}
.archived-name{font-size:14px;font-weight:600;color:#888;}
.archived-addr{font-size:12px;color:#bbb;margin-top:1px;}

<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">NAGeo <span>Tracker</span></div>
    <div class="login-sub">North American GeoThermal &mdash; Install Management</div>
    <div class="pin-row"><input type="password" class="pin-input" id="pin-input" placeholder="Enter your PIN" maxlength="6" inputmode="numeric"></div>
    <button class="login-btn" onclick="doLogin()">Sign in</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-logo">NAGeo <span>Tracker</span></div>
    <button class="sync-btn" onclick="syncHCP()">&#8635; Sync HCP</button>
    <button class="sync-btn" onclick="printReport()" style="border-color:#16a34a;color:#16a34a;">&#128438; Print report</button>
    <button class="settings-btn" onclick="openSettings()" title="Settings">&#9881;</button>
    <div class="topbar-user">Signed in as <strong id="topbar-name"></strong></div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </div>
  <div class="main">
    <div class="stats">
      <div class="stat"><div class="stat-label">Active installs</div><div class="stat-value" id="s-active">0</div></div>
      <div class="stat"><div class="stat-label">Delayed</div><div class="stat-value" id="s-delayed" style="color:#dc2626">0</div></div>
      <div class="stat"><div class="stat-label">In progress</div><div class="stat-value" id="s-inprog" style="color:#ca8a04">0</div></div>
      <div class="stat"><div class="stat-label">Completed</div><div class="stat-value" id="s-complete" style="color:#16a34a">0</div></div>
    </div>
    <div class="view-toggle">
      <button class="vbtn active" id="btn-overview" onclick="setView('overview')">&#9776; Overview</button>
      <button class="vbtn" id="btn-cards" onclick="setView('cards')">&#9783; Installs</button>
      <button class="vbtn" id="btn-log" onclick="setView('log')">&#128203; Activity log</button>
    <button class="vbtn" id="btn-archived" onclick="setView('archived')">&#128451; Archived</button>
    <button class="vbtn" id="btn-docs" onclick="setView('docs')">&#128196; Documents</button>
    </div>
    <div id="view-overview"></div>
    <div id="view-cards" style="display:none"></div>
    <div id="view-log" style="display:none"></div>
    <div id="view-archived" style="display:none"></div>
    <div id="view-docs" style="display:none"></div>
    <button class="add-btn" id="add-job-btn" onclick="addInstall()">+ Add install</button>
  </div>
</div>

  <div class="modal">
    <div class="modal-title">Settings</div>
    <div class="modal-row">
      <div class="modal-label">HCP Customer Tag</div>
      <input type="text" class="modal-input" id="hcp-tag-input" placeholder="e.g. geo-install">
    </div>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeSettings()">Cancel</button>
      <button class="modal-save" onclick="saveSettings()">Save</button>
    </div>
  </div>
</div>

    <button class="mobile-back" onclick="closeMobileDetail()">&#8592; Back</button>

  </div>
  <div class="mobile-detail-body" id="mobile-detail-body"></div>
</div>
<div class="toast" id="toast"></div>

<script>
var SUPABASE_URL = 'https://hpgwwegjsxyxovdattoc.supabase.co';
var SUPABASE_KEY = 'sb_publishable_D2PqYQoJjZ8koEM9NPvmeg_KB_Wa66H';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var MS = ['Equipment ordered','Equipment delivered','Permits pulled','Drilling / loop field','Equipment installation','Startup & commissioning','Yard remediation','Final inspection','Job complete'];
var MS_SHORT = ['Eq.ord','Eq.del','Permits','Drilling','Install','Startup','Yard','Inspect','Complete'];
var currentUser = null, users = [], installs = [], archivedJobs = [], activityLog = [], allDocuments = [];
var openCards = new Set(), openMS = new Set(), openNotes = new Set(), showDel = new Set(), showArchive = new Set();
var currentView = 'overview', selectedUserId = null, dragId = null, dragOverId = null;

async function init() {
  var saved = localStorage.getItem('nageo_user');
  if (saved) { currentUser = JSON.parse(saved); showApp(); }
  else { await loadUsers(); showLogin(); }
}

async function loadUsers() {
  var res = await sb.from('users').select('*').order('name');
  users = res.data || [];
}

function showLogin() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}



async function doLogin() {
  var pin = document.getElementById('pin-input').value.trim();
  if (!pin) { document.getElementById('login-error').textContent = 'Please enter your PIN.'; return; }
  var user = users.find(function(u){return u.pin === pin;});
  if (!user) {
    document.getElementById('login-error').textContent = 'PIN not recognized. Try again.';
    document.getElementById('pin-input').value = ''; return;
  }
  currentUser = user;
  localStorage.setItem('nageo_user', JSON.stringify(user));
  showApp();
}

document.addEventListener('keydown', function(e) {
  if (e.key==='Enter' && document.getElementById('login-screen').style.display!=='none') doLogin();
});

document.getElementById('pin-input').addEventListener('input', function() {
  if (this.value.length >= 4) {
    var user = users.find(function(u){ return u.pin === this.value; }, this);
    if (user) doLogin();
  }
});

function doLogout() {
  currentUser = null; localStorage.removeItem('nageo_user');
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('pin-input').value = '';
}

async function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('topbar-name').textContent = currentUser.name;
  await loadSettings();
  await loadAll();
  startRealtime();
}

async function loadAll() {
  var r1 = await sb.from('jobs').select('*').order('sort_order',{ascending:true}).order('created_at',{ascending:false});
  var r2 = await sb.from('milestones').select('*').order('index');
  var r3 = await sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(500);
  var r4 = await sb.from('documents').select('*').order('created_at',{ascending:false});
  var rawJobs = r1.data || [], allMS = r2.data || [];
  activityLog = r3.data || [];
  allDocuments = r4.data || [];
  var allJobs = rawJobs.map(function(j) {
    return Object.assign({},j,{
      hcp_notes: j.hcp_notes||[],
      milestones: MS.map(function(_,i){
        var f = allMS.find(function(m){return m.job_id===j.id&&m.index===i;});
        return f||{job_id:j.id,index:i,state:'none',date:'',notes:'',pinned_note:null};
      })
    });
  });
  installs = allJobs.filter(function(j){ return !j.archived; });
  archivedJobs = allJobs.filter(function(j){ return !!j.archived; });
  render();
}

async function saveMilestone(jobId, idx, fields) {
  var inst = installs.find(function(j){return j.id===jobId;});
  var m = inst.milestones[idx];
  Object.assign(m, fields);
  var payload = {job_id:jobId,index:idx,state:m.state,date:m.date||null,notes:m.notes||null,pinned_note:m.pinned_note||null,updated_by:currentUser.id,updated_at:new Date().toISOString()};
  if (m.id) { await sb.from('milestones').update(payload).eq('id',m.id); }
  else { var r = await sb.from('milestones').insert(payload).select().single(); if(r.data) m.id=r.data.id; }
  await logActivity(jobId,'Updated "'+MS[idx]+'" to '+m.state+(m.notes?': '+m.notes:''));
  render();
}

async function saveJobField(jobId, field, value) {
  await sb.from('jobs').update({[field]:value,updated_at:new Date().toISOString()}).eq('id',jobId);
  installs.find(function(j){return j.id===jobId;})[field]=value;
  await logActivity(jobId,'Updated '+field+': '+value);
  render();
}

async function logActivity(jobId, action) {
  var entry = {job_id:jobId,user_id:currentUser.id,user_name:currentUser.name,action:action,created_at:new Date().toISOString(),detail:null};
  await sb.from('activity_log').insert(entry);
  activityLog.unshift(entry);
}

async function deleteInstall(jobId) {
  var inst = installs.find(function(j){return j.id===jobId;});
  await sb.from('milestones').delete().eq('job_id',jobId);
  await sb.from('activity_log').delete().eq('job_id',jobId);
  await sb.from('jobs').delete().eq('id',jobId);
  installs = installs.filter(function(j){return j.id!==jobId;});
  openCards.delete(jobId); showDel.delete(jobId);
  showToast((inst?inst.name:'Install')+' deleted.');
  render();
}

async function addInstall() {
  var name = prompt('Customer full name:');
  if (!name) return;
  var address = prompt('Job address:');
  var maxOrder = installs.reduce(function(max,j){return Math.max(max,j.sort_order||0);},0);
  var r = await sb.from('jobs').insert({name:name,address:address||'',equipment:'',hcp_notes:[],sort_order:maxOrder+1,updated_at:new Date().toISOString()}).select().single();
  if (r.data) {
    r.data.milestones = MS.map(function(_,i){return {job_id:r.data.id,index:i,state:'none',date:'',notes:'',pinned_note:null};});
    r.data.hcp_notes=[];
    installs.unshift(r.data);
    openCards.add(r.data.id);
    await logActivity(r.data.id,'Install created');
    setView('cards'); render();
  }
}

var pendingHCPCustomers = [];

async function syncHCP() {
  var settings = getSettings();

  showToast('Syncing from Housecall Pro...');
  try {
    var res = await fetch('https://hpgwwegjsxyxovdattoc.supabase.co/functions/v1/swift-api', {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+SUPABASE_KEY,'apikey':SUPABASE_KEY},
      body:JSON.stringify({tag:appSettings.hcpTag||'geo-install'})
    });
    if (!res.ok) { showToast('HCP sync failed. Check your API key.'); return; }
    var data = await res.json();
    var customers = data.customers || [];
    if (!customers.length) { showToast('No customers found with that tag.'); return; }
    var toImport = [];
    var updated = 0;
    for (var i=0;i<customers.length;i++) {
      var c = customers[i];
      var hcpId = 'cust-'+c.id;
      var existing = installs.find(function(j){return j.hcp_job_id===hcpId;});
      if (existing) {
        // update notes and customer_id if missing, never touch milestones
        var freshNotes = c.all_notes || (c.notes&&c.notes.trim()?[{id:'customer-note',type:'Customer',date:c.updated_at,text:c.notes.trim()}]:[]);
        var freshId = '';
        (c.tags||[]).forEach(function(t){ var s=typeof t==='string'?t:(t.name||''); if(/^\d{5}$/.test(s)) freshId=s; });
        var needsUpdate = false;
        var updatePayload = {updated_at:new Date().toISOString()};
        if (JSON.stringify(freshNotes) !== JSON.stringify(existing.hcp_notes)) {
          existing.hcp_notes = freshNotes;
          updatePayload.hcp_notes = freshNotes;
          needsUpdate = true;
        }
        if (freshId && (!existing.customer_id || existing.customer_id === '')) {
          existing.customer_id = freshId;
          updatePayload.customer_id = freshId;
          needsUpdate = true;
        }
        if (needsUpdate) {
          await sb.from('jobs').update(updatePayload).eq('id',existing.id);
          updated++;
        }
      } else {
        toImport.push(c);
      }
    }
    if (!toImport.length && !updated) { showToast('Everything up to date.'); render(); return; }
    if (!toImport.length) { showToast('Updated notes on '+updated+' install(s).'); render(); return; }
    // check if any have multiple addresses — if so, show picker
    var needsPicker = toImport.filter(function(c){return c.addresses&&c.addresses.length>1;});
    var noPickerNeeded = toImport.filter(function(c){return !c.addresses||c.addresses.length<=1;});
    // auto-import single-address customers
    var added = 0;
    var maxOrder = installs.reduce(function(max,j){return Math.max(max,j.sort_order||0);},0);
    for (var j=0;j<noPickerNeeded.length;j++) {
      var c2 = noPickerNeeded[j];
      added += await importCustomer(c2, c2.addresses&&c2.addresses.length?c2.addresses[0]:null, maxOrder+added);
    }
    if (needsPicker.length) {
      pendingHCPCustomers = needsPicker;
      showAddressPicker();
    } else {
      showToast('Synced '+added+' new install(s) from HCP.');
      render();
    }
  } catch(e) { showToast('HCP sync error. Check your API key and tag.'); }
}

async function importCustomer(c, addr, sortOrder) {
  var hcpId = 'cust-'+c.id;
  var fullName = ((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown';
  var addrStr = addr ? [addr.street, addr.street_line_2, addr.city, addr.state, addr.zip].filter(Boolean).join(', ') : '';
  var hcpNotes = [];
  if (c.notes && c.notes.trim()) hcpNotes.push({id:'note-0',text:c.notes.trim()});
  var customerId = '';
  var ctags = c.tags || [];
  for(var ti=0;ti<ctags.length;ti++){
    var ct = typeof ctags[ti]==='string'?ctags[ti]:(ctags[ti].name||'');
    if(ct.length===5 && !isNaN(ct)){ customerId = ct; break; }
  }
  var r = await sb.from('jobs').insert({hcp_job_id:hcpId,name:fullName,address:addrStr,equipment:'',hcp_notes:hcpNotes,customer_id:customerId,sort_order:sortOrder,updated_at:new Date().toISOString()}).select().single();
  if (r.data) {
    r.data.milestones=MS.map(function(_,mi){return {job_id:r.data.id,index:mi,state:'none',date:'',notes:'',pinned_note:null};});
    r.data.hcp_notes=hcpNotes;
    installs.push(r.data);
    await logActivity(r.data.id,'Imported from HCP: '+fullName);
    return 1;
  }
  return 0;
}

function showAddressPicker() {
  var modal = document.getElementById('addr-picker-modal');
  var body = document.getElementById('addr-picker-body');
  var c = pendingHCPCustomers[0];
  var fullName = ((c.first_name||'')+' '+(c.last_name||'')).trim();
  var html = '<p style="font-size:13px;color:#555;margin-bottom:1rem;">Which address should we use for <strong>'+fullName+'</strong>?</p>';
  html += '<div style="display:flex;flex-direction:column;gap:8px;">';
  c.addresses.forEach(function(a,i) {
    var addrStr = [a.street, a.street_line_2, a.city, a.state, a.zip].filter(Boolean).join(', ');
    html += '<button onclick="selectAddress('+i+')" style="padding:10px 14px;border:0.5px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;text-align:left;font-family:inherit;font-size:13px;">';
    html += '<span style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.5px;">'+a.type+'</span><br>';
    html += addrStr;
    html += '</button>';
  });
  html += '</div>';
  body.innerHTML = html;
  modal.classList.add('open');
}

async function selectAddress(addrIdx) {
  var c = pendingHCPCustomers.shift();
  var maxOrder = installs.reduce(function(max,j){return Math.max(max,j.sort_order||0);},0);
  await importCustomer(c, c.addresses[addrIdx], maxOrder+1);
  document.getElementById('addr-picker-modal').classList.remove('open');
  if (pendingHCPCustomers.length) {
    showAddressPicker();
  } else {
    showToast('HCP sync complete.');
    render();
  }
}

var appSettings = {};

async function loadSettings() {
  // try Supabase first
  var r = await sb.from('settings').select('*');
  if (r.data && r.data.length) {
    r.data.forEach(function(row){ appSettings[row.key] = row.value; });
  }
  // merge with localStorage as fallback
  var local = JSON.parse(localStorage.getItem('nageo_settings')||'{}');
  if (local.hcpKey && !appSettings.hcpKey) appSettings.hcpKey = local.hcpKey;
  if (local.hcpTag && !appSettings.hcpTag) appSettings.hcpTag = local.hcpTag;
}

function getSettings(){ return appSettings; }

async function openSettings(){
  await loadSettings();
  document.getElementById('hcp-tag-input').value=appSettings.hcpTag||'geo-install';
  document.getElementById('settings-modal').classList.add('open');
}

function closeSettings(){document.getElementById('settings-modal').classList.remove('open');}

async function saveSettings(){
  var hcpTag = document.getElementById('hcp-tag-input').value.trim()||'geo-install';
  appSettings.hcpTag = hcpTag;
  localStorage.setItem('nageo_settings',JSON.stringify({hcpTag:hcpTag}));

function initials(n){return n.split(' ').map(function(w){return w[0];}).join('').toUpperCase().slice(0,2);}
function doneCount(j){return j.milestones.filter(function(m){return m.state==='done';}).length;}
function naCount(j){return j.milestones.filter(function(m){return m.state==='na';}).length;}
function progressLabel(j){var done=doneCount(j);var total=9-naCount(j);return done+'/'+total;}
function hasDelay(j){return j.milestones.some(function(m){return m.state==='delayed';});}
function isComplete(j){return j.milestones.every(function(m){return m.state==='done'||m.state==='na';});}
function curMS(j){var i=j.milestones.findIndex(function(m){return m.state!=='done';});return i===-1?MS[MS.length-1]:MS[i];}
function getNoteText(inst,nid){var n=(inst.hcp_notes||[]).find(function(n){return n.id===nid;});return n?n.text:null;}
function timeAgo(ts){
  var d=Math.floor((Date.now()-new Date(ts))/1000);
  var dt=new Date(ts);
  var opts={hour:'numeric',minute:'2-digit',hour12:true,timeZone:'America/New_York'};
  var timeStr=dt.toLocaleTimeString('en-US',opts);
  var dateStr=dt.toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'America/New_York'});
  var today=new Date();
  var todayET=today.toLocaleDateString('en-US',{timeZone:'America/New_York'});
  var dtET=dt.toLocaleDateString('en-US',{timeZone:'America/New_York'});
  var isToday=todayET===dtET;
  if(d<60)return 'just now';
  if(d<3600)return Math.floor(d/60)+'m ago &middot; '+timeStr;
  if(isToday)return timeStr;
  return dateStr+' &middot; '+timeStr;
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},3000);}
function dc(s){return 'ms-dot '+(s==='done'?'dot-done':s==='inprog'?'dot-inprog':s==='delayed'?'dot-delayed':s==='na'?'dot-na':'dot-none');}
function di(s){return s==='done'?'&#10003;':s==='inprog'?'&#9711;':s==='delayed'?'!':s==='na'?'N/A':'';}
function sic(s){return 'si '+(s==='done'?'si-done':s==='inprog'?'si-inprog':s==='delayed'?'si-delayed':s==='na'?'si-na':'');}
function rc(s){return 'ms-row '+(s==='done'?'done-row':s==='inprog'?'inprog-row':s==='delayed'?'delayed-row':s==='na'?'na-row':'');}

function updateStats(){
  document.getElementById('s-active').textContent=installs.filter(function(j){return !isComplete(j);}).length;
  document.getElementById('s-delayed').textContent=installs.filter(function(j){return hasDelay(j);}).length;
  document.getElementById('s-inprog').textContent=installs.filter(function(j){return j.milestones.some(function(m){return m.state==='inprog';});}).length;
  document.getElementById('s-complete').textContent=installs.filter(function(j){return isComplete(j);}).length;
}

var logPage = 50;
var logSearch = '';

function parseTS(ts) {
  if (!ts) return new Date();
  var s = ts.replace(' ', 'T');
  if (!s.endsWith('Z') && !s.includes('+')) s += 'Z';
  return new Date(s);
}

function formatLogTime(ts) {
  var dt = parseTS(ts);
  var timeStr = dt.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
  var dateStr = dt.toLocaleDateString('en-US', {month:'short', day:'numeric'});
  var todayStr = new Date().toLocaleDateString('en-US');
  var dtStr = dt.toLocaleDateString('en-US');
  var isToday = todayStr === dtStr;
  if (isToday) return timeStr;
  return dateStr + ' &middot; ' + timeStr;
}

    var name = (jobMap[l.job_id]||'').toLowerCase();
    var who = (l.user_name||'').toLowerCase();
    var what = (l.action||'').toLowerCase();
    var q = logSearch.toLowerCase();
    return name.includes(q)||who.includes(q)||what.includes(q);
  }) : activityLog;
  var html='<div class="log-section">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">';
  html+='<div class="log-title">Activity log ('+filtered.length+(logSearch?' results':''+' entries')+')</div>';
  html+='<input type="text" id="log-search-input" placeholder="Search by customer, user, action..." value="'+logSearch+'" oninput="setLogSearch(this.value)" style="font-size:12px;padding:5px 10px;border:0.5px solid #ddd;border-radius:8px;background:#f9f9f7;font-family:inherit;width:260px;">';
  html+='</div>';
  html+='<div class="log-list">';
  filtered.slice(0,logPage).forEach(function(l){
    html+='<div class="log-item">';
    html+='<span class="log-who">'+l.user_name+'</span>';
    html+='<span class="log-what">'+(jobMap[l.job_id]?'<strong>'+jobMap[l.job_id]+'</strong> &mdash; ':'')+l.action+'</span>';
    html+='<span class="log-when">'+formatLogTime(l.created_at)+'</span>';
    html+='</div>';
  });
  html+='</div>';
  if(filtered.length > logPage){
    html+='<button onclick="loadMoreLog()" style="margin-top:10px;width:100%;padding:10px;background:#fff;border:0.5px solid #ddd;border-radius:8px;cursor:pointer;font-size:13px;color:#888;font-family:inherit;">Load more ('+(filtered.length-logPage)+' remaining)</button>';
  }
  html+='</div>';
  el.innerHTML=html;
  // re-focus search if was searching
  if(logSearch){var si=document.getElementById('log-search-input');if(si){si.focus();si.setSelectionRange(si.value.length,si.value.length);}}
}

function setState(jobId,idx,state){
  var m=installs.find(function(j){return j.id===jobId;}).milestones[idx];
  var date=state==='done'?(m.date||new Date().toISOString().slice(0,10)):'';
  saveMilestone(jobId,idx,{state:state,date:date,notes:state==='na'?'':m.notes});
}
function setMSField(jobId,idx,field,val){saveMilestone(jobId,idx,{[field]:val});}

async function pinToEquip(jobId,noteId){
  var inst=installs.find(function(j){return j.id===jobId;});
  var isPinned=inst.pinned_equip_note===noteId;
  inst.pinned_equip_note=isPinned?null:noteId;
  if(!isPinned){var note=inst.hcp_notes.find(function(n){return n.id===noteId;});if(note)inst.equipment=note.text;}
  await sb.from('jobs').update({pinned_equip_note:inst.pinned_equip_note,equipment:inst.equipment,updated_at:new Date().toISOString()}).eq('id',jobId);
  await logActivity(jobId,isPinned?'Unpinned equipment note':'Pinned note to equipment');
  render();
}

async function pinToMS(jobId,noteId,msIdx){
  if(msIdx==='')return;
  var inst=installs.find(function(j){return j.id===jobId;});
  var idx=parseInt(msIdx);
  for(var i=0;i<inst.milestones.length;i++){if(inst.milestones[i].pinned_note===noteId)await saveMilestone(jobId,i,{pinned_note:null});}
  await saveMilestone(jobId,idx,{pinned_note:noteId});
  await logActivity(jobId,'Pinned note to "'+MS[idx]+'"');
}

async function unpinMS(jobId,idx){
  await saveMilestone(jobId,idx,{pinned_note:null});
  await logActivity(jobId,'Unpinned note from "'+MS[idx]+'"');
}

function dragStart(e,id){
  dragId=id; e.dataTransfer.effectAllowed='move';
  setTimeout(function(){var el=document.getElementById('card-'+id);if(el)el.classList.add('dragging');},0);
}
function dragEnd(e){
  document.querySelectorAll('.card').forEach(function(el){el.classList.remove('dragging');el.classList.remove('drag-over');});
  dragId=null; dragOverId=null;
}
function dragOver(e,id){
  e.preventDefault();
  if(id===dragId)return;
  if(dragOverId!==id){
    document.querySelectorAll('.card').forEach(function(el){el.classList.remove('drag-over');});
    var el=document.getElementById('card-'+id);if(el)el.classList.add('drag-over');
    dragOverId=id;
  }
  e.dataTransfer.dropEffect='move';
}
async function drop(e,targetId){
  e.preventDefault();
  if(!dragId||dragId===targetId)return;
  var fi=installs.findIndex(function(j){return j.id===dragId;});
  var ti=installs.findIndex(function(j){return j.id===targetId;});
  if(fi===-1||ti===-1)return;
  var moved=installs.splice(fi,1)[0];
  installs.splice(ti,0,moved);
  installs.forEach(function(j,i){j.sort_order=i;});
  render();
  await Promise.all(installs.map(function(j,i){return sb.from('jobs').update({sort_order:i}).eq('id',j.id);}));
  showToast('Order saved.');
}

async function confirmArchive(jobId) {
  var inst = installs.find(function(j){return j.id===jobId;});

async function reactivateInstall(jobId) {
  var inst = archivedJobs.find(function(j){return j.id===jobId;});

  await sb.from('jobs').update({archived:false,updated_at:new Date().toISOString()}).eq('id',jobId);

  archivedJobs = archivedJobs.filter(function(j){return j.id!==jobId;});

var openDocSections = new Set();

function renderMiniDropZone(jobId, category, docs) {
  var zoneId = 'mdz-' + jobId + '-' + category;
  var inputId = 'mfi-' + jobId + '-' + category;
  var h = '';
  // show existing docs
  if(docs && docs.length) {
    docs.forEach(function(d) {
      h += '<div class="mini-doc-item">';
      h += '<span>'+getFileIcon(d.file_name)+'</span>';
      h += '<span class="mini-doc-name" title="'+d.file_name+'">'+d.file_name+'</span>';
      h += '<span style="font-size:10px;color:#aaa;">'+formatFileSize(d.file_size)+'</span>';
      h += '<button class="mini-doc-btn" data-path="'+d.file_path+'" data-name="'+d.file_name+'" onclick="downloadDoc(this)">&#11123;</button>';
      h += '<button class="mini-doc-btn danger" data-doc="'+d.id+'" data-path="'+d.file_path+'" onclick="deleteDoc(this)">&#128465;</button>';
      h += '</div>';
    });
  }
  h += '<div class="mini-drop-zone" id="'+zoneId+'" ondragover="mdzOver(event,\''+zoneId+'\',true)" ondragleave="mdzOver(event,\''+zoneId+'\',false)" ondrop="mdzDrop(event,\''+jobId+'\',\''+category+'\')">';

function renderAdditionalDocs(j) {

function mdzOver(e, zoneId, active) {
  e.preventDefault();
  var dz = document.getElementById(zoneId);
  if(dz) dz.classList.toggle('drag-active', active);
}
function mdzClick(inputId) {
  var fi = document.getElementById(inputId);
  if(fi) fi.click();
}
function mdzDrop(e, jobId, category) {
  e.preventDefault();
  var zoneId = 'mdz-'+jobId+'-'+category;
  var dz = document.getElementById(zoneId);
  if(dz) dz.classList.remove('drag-active');
  if(e.dataTransfer.files.length) uploadFilesWithCategory(Array.from(e.dataTransfer.files), jobId, category);
}
function mdzFiles(input, jobId, category) {
  if(input.files.length) uploadFilesWithCategory(Array.from(input.files), jobId, category);

}

async function uploadFilesWithCategory(files, jobId, category) {
  for(var i=0;i<files.length;i++) {
    var file = files[i];
    var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    var path = jobId+'/'+category+'/'+Date.now()+'_'+safeName;
    var res = await sb.storage.from('install-docs').upload(path, file, {upsert:false});
    if(res.error){ showToast('Upload failed: '+file.name); continue; }
    var docRow = {job_id:jobId,file_name:file.name,file_path:path,file_size:file.size,category:category,uploaded_by:currentUser.id,uploaded_by_name:currentUser.name};
    var ins = await sb.from('documents').insert(docRow).select().single();
    if(ins.data) allDocuments.unshift(ins.data);
  }
  // keep section open
  openDocSections.add(jobId);
  openCards.add(jobId);
  render();
  showToast(files.length+' file'+(files.length!==1?'s':'')+' uploaded.');
}
var openDocsGroups = new Set();
var CATEGORIES = ['General','Permit','Electrical','Oven Hood','Equipment Specs','Loop Field','Contract','Inspection','Other'];

function getFileIcon(name) {
  var ext = (name.split('.').pop()||'').toLowerCase();
  if(['pdf'].includes(ext)) return '&#128196;';
  if(['jpg','jpeg','png','gif','webp'].includes(ext)) return '&#128247;';
  if(['doc','docx'].includes(ext)) return '&#128209;';
  if(['xls','xlsx','csv'].includes(ext)) return '&#128202;';
  if(['dwg','dxf'].includes(ext)) return '&#9999;';
  return '&#128196;';
}

function formatFileSize(bytes) {
  if(!bytes) return '';
  if(bytes < 1024) return bytes+'B';
  if(bytes < 1048576) return Math.round(bytes/1024)+'KB';
  return (bytes/1048576).toFixed(1)+'MB';
}

function getJobDocs(jobId) {
  return allDocuments.filter(function(d){ return d.job_id === jobId; });
}

function renderDocsSection(j) {
  var docs = getJobDocs(j.id);
  var isOpen = openDocSections.has(j.id);
  var h = '<div class="docs-section">';
  h += '<div class="docs-header"><span class="docs-title">&#128196; Documents ('+ docs.length +')</span>';
  h += '<button onclick="toggleDocSection(\''+j.id+'\')" style="font-size:11px;padding:2px 8px;border:0.5px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;color:#888;font-family:inherit;">'+(isOpen?'Hide':'Show')+'</button></div>';
  if(isOpen) {
    h += renderDropZone(j.id);
    if(docs.length) {
      docs.forEach(function(d) { h += renderDocItem(d); });
    } else {
      h += '<div style="font-size:12px;color:#aaa;text-align:center;padding:8px 0;">No documents yet</div>';
    }
  }
  h += '</div>';
  return h;
}

function renderDropZone(jobId) {
  return '<div class="drop-zone" id="dz-'+jobId+'" ondragover="dzOver(event,\''+jobId+'\',true)" ondragleave="dzOver(event,\''+jobId+'\',false)" ondrop="dzDrop(event,\''+jobId+'\')"><div class="drop-zone-text">&#128228; Drag files here or <strong onclick="dzClick(\''+jobId+'\')">browse</strong><br><span style="font-size:10px;color:#ccc;">PDF, images, Word, Excel — up to 50MB each</span></div><input type="file" id="fi-'+jobId+'" style="display:none" multiple onchange="dzFiles(this,\''+jobId+'\')"></div>';
}

function renderDocItem(d) {
  var h = '<div class="doc-item" id="doc-'+d.id+'">';
  h += '<span class="doc-icon">'+getFileIcon(d.file_name)+'</span>';
  h += '<div class="doc-info"><div class="doc-name" title="'+d.file_name+'">'+d.file_name+'</div>';
  h += '<div class="doc-meta">'+d.category+' &middot; '+formatFileSize(d.file_size)+(d.uploaded_by_name?' &middot; '+d.uploaded_by_name:'')+'</div></div>';
  h += '<select class="doc-category" data-doc="'+d.id+'" onchange="updateDocCategory(this)"><option value="">Category</option>';
  CATEGORIES.forEach(function(c){ h += '<option value="'+c+'" '+(d.category===c?'selected':'')+'>'+c+'</option>'; });
  h += '</select>';
  h += '<div class="doc-actions">';
  h += '<button class="doc-btn" data-path="'+d.file_path+'" data-name="'+d.file_name+'" onclick="downloadDoc(this)">&#11123; Download</button>';
  h += '<button class="doc-btn danger" data-doc="'+d.id+'" data-path="'+d.file_path+'" onclick="deleteDoc(this)">&#128465;</button>';
  h += '</div></div>';
  return h;
}

function renderDocsTab() {
  var el = document.getElementById('view-docs');
  if(!allDocuments.length) {
    el.innerHTML = '<div class="empty">No documents uploaded yet. Open an install card to upload files.</div>';
    return;
  }
  // group by job
  var jobMap = {};
  installs.forEach(function(j){ jobMap[j.id] = j; });
  archivedJobs.forEach(function(j){ jobMap[j.id] = j; });
  var byJob = {};
  allDocuments.forEach(function(d){
    if(!byJob[d.job_id]) byJob[d.job_id] = [];
    byJob[d.job_id].push(d);
  });
  var html = '<div class="docs-tab-section">';
  Object.keys(byJob).forEach(function(jobId){
    var j = jobMap[jobId];
    var name = j ? j.name : 'Unknown';
    var docs = byJob[jobId];
    var isOpen = openDocsGroups.has(jobId);
    html += '<div class="docs-job-group">';
    html += '<div class="docs-job-header" data-job="'+jobId+'" onclick="toggleDocsGroup(this.dataset.job)">';
    html += '<span class="docs-job-name">'+name+'</span>';
    html += '<span class="docs-job-count">'+docs.length+' file'+(docs.length!==1?'s':'')+'</span>';
    html += '<span class="chevron '+(isOpen?'open':'')+'">&#9662;</span></div>';
    html += '<div class="docs-job-body '+(isOpen?'open':'')+'">';
    docs.forEach(function(d){ html += renderDocItem(d); });
    html += '</div></div>';
  });
  html += '</div>';
  el.innerHTML = html;
}

function toggleDocSection(id){ if(openDocSections.has(id))openDocSections.delete(id);else openDocSections.add(id); render(); }
function toggleDocsGroup(id){ if(openDocsGroups.has(id))openDocsGroups.delete(id);else openDocsGroups.add(id); renderDocsTab(); }

function dzClick(jobId) {

function dzDrop(e, jobId) {

async function uploadFiles(files, jobId) {
  var dz = document.getElementById('dz-'+jobId);
  if(dz) dz.innerHTML = '<div class="doc-uploading">Uploading '+files.length+' file'+(files.length!==1?'s':'')+'...</div>';
  for(var i=0;i<files.length;i++) {
    var file = files[i];
    var safeName = file.name.replace(/[^a-zA-Z0-9._-]/g,'_');
    var path = jobId+'/'+Date.now()+'_'+safeName;
    var res = await sb.storage.from('install-docs').upload(path, file, {upsert:false});
    if(res.error){ showToast('Upload failed: '+file.name); continue; }
    var docRow = {job_id:jobId,file_name:file.name,file_path:path,file_size:file.size,category:'General',uploaded_by:currentUser.id,uploaded_by_name:currentUser.name};
    var ins = await sb.from('documents').insert(docRow).select().single();
    if(ins.data) allDocuments.unshift(ins.data);
  }
  openDocSections.add(jobId);
  render();
  showToast(files.length+' file'+(files.length!==1?'s':'')+' uploaded.');
}

async function downloadDoc(el) {
  var path = el.dataset.path;
  var name = el.dataset.name;
  var res = await sb.storage.from('install-docs').createSignedUrl(path, 60);
  if(res.data && res.data.signedUrl) {
    var a = document.createElement('a');
    a.href = res.data.signedUrl;
    a.download = name;
    a.target = '_blank';
    a.click();
  } else { showToast('Download failed.'); }
}

async function deleteDoc(el) {
  if(!confirm('Delete this file? This cannot be undone.')) return;
  var docId = el.dataset.doc;
  var path = el.dataset.path;
  await sb.storage.from('install-docs').remove([path]);
  await sb.from('documents').delete().eq('id', docId);
  allDocuments = allDocuments.filter(function(d){ return d.id !== docId; });
  render();
  showToast('File deleted.');
}

async function updateDocCategory(el) {
  var docId = el.dataset.doc;
  var cat = el.value;
  await sb.from('documents').update({category:cat}).eq('id',docId);
  var doc = allDocuments.find(function(d){ return d.id===docId; });
  if(doc) doc.category = cat;
}

// ── REAL-TIME + AUTO REFRESH ──────────────────────────
var realtimeChannel = null;

function startRealtime() {
  // Auto-refresh every 30 seconds
  setInterval(function() {
    silentRefresh();
  }, 30000);

  // Real-time subscription via Supabase
  realtimeChannel = sb.channel('tracker-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'jobs' }, function() {
      silentRefresh();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'milestones' }, function() {
      silentRefresh();
    })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'activity_log' }, function() {
      silentRefresh();
    })
    .subscribe();
}

var refreshing = false;
var userTyping = false;

document.addEventListener('focusin', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
    userTyping = true;
  }
});
document.addEventListener('focusout', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') {
    setTimeout(function() { userTyping = false; }, 500);
  }
});

async function silentRefresh() {
  if (refreshing || userTyping) return;
  refreshing = true;
  try {
    var r1 = await sb.from('jobs').select('*').order('sort_order',{ascending:true}).order('created_at',{ascending:false});
    var r2 = await sb.from('milestones').select('*').order('index');
    var r3 = await sb.from('activity_log').select('*').order('created_at',{ascending:false}).limit(500);
    var r4 = await sb.from('documents').select('*').order('created_at',{ascending:false});
  var r4 = await sb.from('documents').select('*').order('created_at',{ascending:false});
    var rawJobs = r1.data || [], allMS = r2.data || [];
    activityLog = r3.data || [];
    allDocuments = r4.data || [];
  allDocuments = r4.data || [];
    var allJobs = rawJobs.map(function(j) {
      return Object.assign({},j,{
        hcp_notes: j.hcp_notes||[],
        milestones: MS.map(function(_,i){
          var f = allMS.find(function(m){return m.job_id===j.id&&m.index===i;});
          return f||{job_id:j.id,index:i,state:'none',date:'',notes:'',pinned_note:null};
        })
      });
    });
    installs = allJobs.filter(function(j){ return !j.archived; });
    archivedJobs = allJobs.filter(function(j){ return !!j.archived; });
    render();
  } catch(e) {}
  refreshing = false;
}
